apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Infrastructure
        folder: Infrastructure Alerts
        interval: 1m
        rules:
          - uid: high-cpu-usage
            title: HighCPUUsage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [85]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU usage is above 85% on {{ $labels.instance }}"

          - uid: high-memory-usage
            title: HighMemoryUsage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [90]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Memory usage is above 90% on {{ $labels.instance }}"

      - orgId: 1
        name: Kubernetes
        folder: Kubernetes Alerts
        interval: 1m
        rules:
          - uid: pod-crash-looping
            title: PodCrashLooping
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    increase(kube_pod_container_status_restarts_total[10m])
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [3]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            noDataState: OK
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping ({{ $values.B }} restarts in 10m)"

          - uid: pod-not-ready
            title: PodNotReady
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    kube_pod_status_ready{condition="true"}
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [1]
                        type: lt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            noDataState: OK
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for more than 5 minutes"

      - orgId: 1
        name: Application
        folder: Application Alerts
        interval: 1m
        rules:
          - uid: high-error-rate
            title: HighErrorRate
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    sum(rate(http_requests_total{code=~"5.."}[5m]))
                    /
                    sum(rate(http_requests_total[5m]))
                    * 100
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [5]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            noDataState: OK
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "HTTP 5xx error rate is above 5%"

      - orgId: 1
        name: Certificates
        folder: Infrastructure Alerts
        interval: 60m
        rules:
          - uid: cert-expiring-soon
            title: CertificateExpiringSoon
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: >-
                    (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400
                  instant: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        params: []
                        type: last
                  expression: A
                  reducer: last
                  type: reduce
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [7]
                        type: lt
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        params: []
                        type: last
                  expression: B
                  type: threshold
                  refId: C
            noDataState: OK
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} expires in less than 7 days"
