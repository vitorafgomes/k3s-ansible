apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sm-identity-tenant-e2e
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Smart Management"
data:
  smart-management-identity-tenant-e2e.json: |
    {
      "__inputs": [],
      "__elements": {},
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus" },
        { "type": "datasource", "id": "loki", "name": "Loki" },
        { "type": "datasource", "id": "tempo", "name": "Tempo" }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "End-to-end request flow: Frontend (Angular) -> API (.NET) -> Worker (Azure Functions/RabbitMQ) for Smart Management Identity Tenant",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 2,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "tags": ["smart-management"],
          "targetBlank": true,
          "title": "Smart Management Dashboards",
          "type": "dashboards"
        }
      ],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Overview / Service Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Incoming HTTP request rate for the API service, measured from Tempo span metrics (calls/sec).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background_solid",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "API Request Rate",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum(rate(traces_spanmetrics_calls_total{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Percentage of server spans with error status for each service.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 2,
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "orange", "value": 0.05 },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background_solid",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "API Error Rate",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum(rate(traces_spanmetrics_calls_total{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval])) / clamp_min(sum(rate(traces_spanmetrics_calls_total{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])), 1)",
              "legendFormat": "error %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Worker error rate percentage from span metrics.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 2,
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "orange", "value": 0.05 },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background_solid",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Worker Error Rate",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum(rate(traces_spanmetrics_calls_total{service=\"Smart.Management.Identity.Tenant.Worker\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval])) / clamp_min(sum(rate(traces_spanmetrics_calls_total{service=\"Smart.Management.Identity.Tenant.Worker\"}[$__rate_interval])), 1)",
              "legendFormat": "error %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "P50, P95, and P99 latency for API server spans.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Duration",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "s"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "P99" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "P95" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "P50" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 5, "w": 8, "x": 12, "y": 1 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "right" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "API Latency (P50/P95/P99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "histogram_quantile(0.50, sum(rate(traces_spanmetrics_latency_bucket{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Current ready replicas for the Identity Tenant Worker deployment, driven by KEDA autoscaling (0-5).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "text", "text": "Scaled to Zero" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "text", "value": null },
                  { "color": "green", "value": 1 },
                  { "color": "yellow", "value": 4 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background_solid",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "title": "Worker Replicas",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "kube_deployment_status_replicas{namespace=\"$namespace\", deployment=~\".*identity.*tenant.*worker.*\"}",
              "legendFormat": "Ready",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Request rate over time broken down by service, showing the traffic pattern for both API and Worker.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 6 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Request Rate by Service",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{service=~\"Smart.Management.Identity.Tenant.Api|Smart.Management.Identity.Tenant.Worker|smart-management-ui\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval]))",
              "legendFormat": "{{ service }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Error rate percentage over time for each service, showing the proportion of errored spans.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": {
                  "mode": "line+area",
                  "lineColor": "red",
                  "fillColor": "red"
                }
              },
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 6 },
          "id": 8,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Error Rate by Service",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{service=~\"Smart.Management.Identity.Tenant.Api|Smart.Management.Identity.Tenant.Worker\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval])) / clamp_min(sum by (service) (rate(traces_spanmetrics_calls_total{service=~\"Smart.Management.Identity.Tenant.Api|Smart.Management.Identity.Tenant.Worker\"}[$__rate_interval])), 1)",
              "legendFormat": "{{ service }}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 10,
          "title": "Frontend -> API Flow (Traces)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Trace duration distribution for the Frontend service (smart-management-ui), showing how long end-user operations take.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "scheme", "schemeName": "BuPu" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Duration",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 11,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Frontend Trace Duration (Histogram)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum by (le) (increase(traces_spanmetrics_latency_bucket{service=\"smart-management-ui\", span_kind=\"SPAN_KIND_CLIENT\"}[$__rate_interval]))",
              "format": "heatmap",
              "legendFormat": "{{ le }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "HTTP request duration percentiles for the API, broken down by route (span_name).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Duration",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "API P95 Latency by Endpoint",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "histogram_quantile(0.95, sum by (le, span_name) (rate(traces_spanmetrics_latency_bucket{service=\"Smart.Management.Identity.Tenant.Api\", span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])))",
              "legendFormat": "{{ span_name }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
          "description": "Count of spans with ERROR status per service over time.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 30,
                "gradientMode": "scheme",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Api.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Worker.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "id": 13,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Error Traces Count by Service",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource_prometheus}" },
              "expr": "sum by (service) (increase(traces_spanmetrics_calls_total{service=~\"Smart.Management.Identity.Tenant.Api|Smart.Management.Identity.Tenant.Worker|smart-management-ui\", status_code=\"STATUS_CODE_ERROR\"}[$__rate_interval]))",
              "legendFormat": "{{ service }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "tempo", "uid": "${datasource_tempo}" },
          "description": "Recent traces exceeding 1 second duration. Click a Trace ID to open the full trace view in Tempo.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "traceID" },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open Trace in Tempo",
                        "url": "/explore?left=%7B%22datasource%22:%22${datasource_tempo}%22,%22queries%22:%5B%7B%22refId%22:%22A%22,%22datasource%22:%7B%22type%22:%22tempo%22,%22uid%22:%22${datasource_tempo}%22%7D,%22queryType%22:%22traceql%22,%22query%22:%22${__value.raw}%22%7D%5D%7D",
                        "targetBlank": true
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "traceDuration" },
                "properties": [
                  { "id": "unit", "value": "ms" },
                  { "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "gauge" } },
