          "targets": [
            {
              "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
              "expr": "sum by (level) (count_over_time({namespace=\"smart-management\", app_instance=~\"$service\"} | json [$__interval]))",
              "legendFormat": "{{level}}",
              "refId": "A"
