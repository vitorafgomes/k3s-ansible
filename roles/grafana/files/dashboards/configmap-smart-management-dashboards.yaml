          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom", "sortBy": "Total", "sortDesc": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
